<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
body{font-family:"Microsoft YaHei",sans-serif;width:300px;padding:14px;font-size:12px;color:#333}
.btn{width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold;color:#fff;margin:6px 0}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.btn:hover{opacity:.9}
.status{font-size:11px;color:#888;margin:4px 0;text-align:center;min-height:16px}
.count-badge{display:inline-block;background:#e6f7ff;color:#1677ff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold}
#log{background:#fafbfc;border-radius:4px;padding:6px;max-height:100px;overflow-y:auto;margin-top:8px;font-family:monospace}
#jd-list{max-height:200px;overflow-y:auto;margin-top:8px}
</style></head>
<body>
<h3 style="margin:0 0 2px;font-size:15px">🎯 Offer 捕手</h3>
<p style="font-size:11px;color:#888;margin:0 0 10px">在BOSS详情页一键抓取JD</p>
<div class="status" id="status">就绪</div>
<button class="btn btn-primary" id="btn-current">📄 抓取当前岗位JD</button>
<button class="btn btn-primary" id="btn-batch" style="background:linear-gradient(135deg,#10b981,#059669)">📦 逐个抓取本页岗位</button>
<div class="status">已收集: <span class="count-badge" id="count">0</span> 个JD</div>
<div id="jd-list"></div>
<button class="btn btn-primary" id="btn-clear" style="background:#fff;color:#999;border:1px solid #d9d9d9">🗑 清空</button>
<div id="log"></div>
<script src="popup.js"></script>
</body></html>
